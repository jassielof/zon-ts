name: CI
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Check formatting
        run: deno fmt --check
      - name: Check linting
        run: deno lint
      - name: Check types
        run: deno check
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Package
        run: deno pack
  test:
    runs-on: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Run tests
        run: deno test --permission-set
